name: RAG Evaluation

on:
  pull_request:
    branches: [main, master]
    paths:
      - "ragevals/**"
      - "configs/**"
      - "data/**"

jobs:
  evaluate:
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-eval-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-eval-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Verify API key is set
        run: |
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY secret is not set. Add it in Settings > Secrets."
            exit 1
          fi
          echo "OPENAI_API_KEY is configured."

      - name: Run RAG evaluation
        run: |
          python -m ragevals evaluate \
            --config configs/eval_basic.yaml \
            --output results.json \
            --no-history

      - name: Upload evaluation results
        uses: actions/upload-artifact@v4
        with:
          name: eval-results-${{ github.run_number }}
          path: results.json
          retention-days: 30

      - name: Check metric thresholds
        run: |
          python -c "
          import json, sys

          with open('results.json') as f:
              results = json.load(f)

          thresholds = {
              'faithfulness': 0.7,
              'answer_relevancy': 0.7,
              'context_recall': 0.6,
              'context_precision': 0.6,
          }

          scores = results.get('scores', results.get('aggregate_scores', {}))
          failed = []

          for metric, minimum in thresholds.items():
              score = scores.get(metric)
              if score is None:
                  print(f'WARNING: metric {metric} not found in results')
                  continue
              status = 'PASS' if score >= minimum else 'FAIL'
              print(f'{metric}: {score:.3f} (threshold: {minimum}) [{status}]')
              if score < minimum:
                  failed.append(f'{metric}={score:.3f} < {minimum}')

          if failed:
              print(f'\nFailed thresholds: {len(failed)}')
              for f_msg in failed:
                  print(f'  - {f_msg}')
              sys.exit(1)
          else:
              print('\nAll thresholds passed.')
          "
