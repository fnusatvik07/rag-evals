# Retriever-Only Evaluation Configuration
# Focuses exclusively on retrieval quality metrics (no generation metrics)

evaluation:
  name: "retriever_eval"
  description: "Evaluation focused on retrieval quality metrics only, independent of generation"
  dataset: "data/golden_basic.json"
  knowledge_base: "data/knowledge_base.json"

ragas:
  metrics:
    - name: "context_precision"
      description: "Measures the proportion of relevant items in the retrieved context"
      threshold: 0.6
    - name: "context_recall"
      description: "Measures the proportion of relevant context that was successfully retrieved"
      threshold: 0.6
    - name: "context_relevancy"
      description: "Measures how relevant the retrieved context is to the input query"
      threshold: 0.6
    - name: "context_entity_recall"
      description: "Measures recall of entities from reference answer found in retrieved context"
      threshold: 0.5

deepeval:
  metrics:
    - name: "ContextualPrecisionMetric"
      description: "Measures precision of the retrieved context for the given query"
      threshold: 0.6
    - name: "ContextualRecallMetric"
      description: "Measures recall of the retrieved context against the ground truth"
      threshold: 0.6
    - name: "ContextualRelevancyMetric"
      description: "Measures how relevant the retrieved context is to the input query"
      threshold: 0.6

retriever:
  top_k_values: [1, 3, 5, 10]
  similarity_metrics:
    - "cosine"
    - "dot_product"
  chunk_sizes: [256, 512, 1024]
  overlap_sizes: [50, 100, 200]

settings:
  llm_model: "gpt-4"
  embedding_model: "text-embedding-3-small"
  batch_size: 20
  verbose: true
  output_format: "json"
  output_dir: "results/retriever"
